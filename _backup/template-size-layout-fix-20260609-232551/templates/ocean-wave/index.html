<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FlowSync Template - Ocean Wave</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  padding:54px 28px;
  background:
    radial-gradient(circle at 48% 0%,rgba(101,71,255,.12),transparent 30%),
    #f7f8fc;
  color:#101219;
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.page{
  width:min(1240px,100%);
  margin:0 auto;
  display:grid;
  grid-template-columns:minmax(440px,620px) minmax(360px,520px);
  gap:42px;
  align-items:center;
}
.top-actions{
  position:fixed;
  top:18px;
  left:24px;
  right:24px;
  z-index:20;
  display:flex;
  justify-content:space-between;
  pointer-events:none;
}
.top-actions a,.top-actions button{
  pointer-events:auto;
  min-height:44px;
  padding:0 18px;
  border:0;
  border-radius:999px;
  background:rgba(255,255,255,.78);
  color:#64748b;
  text-decoration:none;
  font-weight:900;
  box-shadow:0 12px 35px rgba(37,42,65,.08);
  cursor:pointer;
}
.top-actions button{
  color:#fff;
  background:linear-gradient(135deg,#6547ff,#2f80ff);
}
.preview-area{
  display:grid;
  place-items:center;
}
.card{
  width:100%;
  max-width:620px;
  aspect-ratio:1.25/1;
  border-radius:46px;
  position:relative;
  overflow:hidden;
  background:#fff;
  box-shadow:0 34px 92px rgba(37,42,65,.14);
  border:1px solid rgba(226,229,240,.92);
  isolation:isolate;
}
.card::before,.card::after,.shape-a,.shape-b,.shape-c{
  content:"";
  position:absolute;
  pointer-events:none;
  z-index:0;
}
.card::before{
  width:280px;
  height:280px;
  right:-70px;
  top:55px;
  border-radius:42% 58% 54% 46%;
  opacity:.28;
}
.card::after{
  width:210px;
  height:210px;
  left:-70px;
  bottom:-70px;
  border-radius:999px;
  background:rgba(255,255,255,.44);
}
.card-content{
  position:absolute;
  z-index:5;
}
.kicker{
  display:inline-flex;
  min-height:34px;
  align-items:center;
  padding:0 14px;
  border-radius:999px;
  background:rgba(255,255,255,.64);
  font-size:12px;
  font-weight:950;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.title{
  display:block;
  margin-top:18px;
  font-size:52px;
  line-height:.95;
  letter-spacing:-.07em;
  font-weight:950;
  outline:0;
}
.sub{
  display:block;
  margin-top:14px;
  max-width:330px;
  color:#64748b;
  font-size:19px;
  line-height:1.4;
  font-weight:720;
  outline:0;
}
.footer{
  position:absolute;
  z-index:6;
  color:#64748b;
  font-size:15px;
  font-weight:900;
  outline:0;
}
.qr-box{
  position:absolute;
  z-index:8;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.94);
  box-shadow:0 22px 52px rgba(37,42,65,.16);
  overflow:hidden;
}
.qr-box img{
  width:72%;
  height:72%;
  object-fit:contain;
  display:none;
}
.qr-box.has-qr img{display:block}
.qr-box span{
  color:#6547ff;
  font-weight:950;
  text-align:center;
  font-size:13px;
  padding:12px;
}
.qr-box.has-qr span{display:none}
.panel{
  border:1px solid rgba(226,229,240,.9);
  border-radius:32px;
  background:rgba(255,255,255,.78);
  box-shadow:0 24px 70px rgba(37,42,65,.10);
  padding:26px;
}
.panel h1{
  margin:0;
  font-size:34px;
  line-height:1;
  letter-spacing:-.055em;
}
.panel p{
  margin:12px 0 20px;
  color:#64748b;
  line-height:1.55;
  font-weight:650;
}
.upload{
  min-height:54px;
  border-radius:18px;
  display:grid;
  place-items:center;
  color:#6547ff;
  background:rgba(101,71,255,.10);
  font-weight:950;
  cursor:pointer;
  margin-bottom:16px;
}
.upload input{display:none}
.field{margin-bottom:12px}
.field label{
  display:block;
  margin-bottom:7px;
  color:#64748b;
  font-size:13px;
  font-weight:900;
}
.field input{
  width:100%;
  height:50px;
  border:1px solid rgba(226,229,240,.95);
  border-radius:16px;
  padding:0 16px;
  outline:0;
  color:#101219;
  font-size:16px;
  font-weight:780;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:18px;
}
.row button{
  min-height:52px;
  border:0;
  border-radius:16px;
  cursor:pointer;
  font-weight:950;
  font-size:15px;
}
.reset{background:#eef2ff;color:#6547ff}
.download{background:linear-gradient(135deg,#6547ff,#2f80ff);color:#fff}
.note{
  margin-top:18px;
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,.58);
  color:#64748b;
  font-weight:750;
  line-height:1.45;
}

/* UNIQUE LAYOUTS */

/* 01 floral: title left, QR lower right, flower cluster top right */

@media(max-width:920px){
  body{padding:78px 16px 28px}
  .page{grid-template-columns:1fr;gap:22px}
  .card{max-width:560px}
  .panel{max-width:560px;margin:0 auto}
}
@media(max-width:520px){
  .card{border-radius:30px}
  .title{font-size:38px}
  .sub{font-size:15px}
  .qr-box{scale:.82}

</head>
<body>
  <div class="top-actions">
    <a href="../">← All templates</a>
    <button id="downloadBtn" type="button">Download PNG</button>
  </div>

  <main class="page">
    <section class="preview-area">
      <article class="card layout-ocean" id="card">
        <i class="shape-a"></i>
        <i class="shape-b"></i>
        <i class="shape-c"></i>

        <div class="card-content">
          <span class="kicker editable" id="cardLabel" contenteditable="true">OCEAN</span>
          <b class="title editable" id="cardTitle" contenteditable="true">Ocean Wave</b>
          <small class="sub editable" id="cardSub" contenteditable="true">Open the link with one clean scan.</small>
        </div>

        <div class="qr-box" id="qrBox">
          <img id="qrImage" alt="Uploaded QR code">
          <span>click to upload QR</span>
        </div>

        <div class="footer editable" id="cardFooter" contenteditable="true">FlowSync Ocean</div>
      </article>
    </section>

    <aside class="panel">
      <h1>Ocean Wave</h1>
      <p>Each template has its own layout. Upload your QR PNG/JPG, edit text, then download the finished card.</p>

      <label class="upload">
        Upload QR PNG/JPG
        <input id="qrUpload" type="file" accept="image/png,image/jpeg,image/webp">
      </label>

      <div class="field">
        <label>Top label</label>
        <input id="inputLabel" value="OCEAN">
      </div>

      <div class="field">
        <label>Title</label>

};

const card = document.getElementById("card");
const qrBox = document.getElementById("qrBox");
const qrUpload = document.getElementById("qrUpload");
const qrImage = document.getElementById("qrImage");

const map = [
  ["inputLabel", "cardLabel"],
  ["inputTitle", "cardTitle"],
  ["inputSub", "cardSub"],
  ["inputFooter", "cardFooter"]
];

function syncFromInputs() {
  map.forEach(([inputId, cardId]) => {
    const input = document.getElementById(inputId);
    const target = document.getElementById(cardId);
    target.textContent = input.value;
  });
}

function syncFromCard(cardId, inputId) {
  const cardEl = document.getElementById(cardId);
  const input = document.getElementById(inputId);
  input.value = cardEl.textContent.trim();
}

map.forEach(([inputId, cardId]) => {
  document.getElementById(inputId).addEventListener("input", syncFromInputs);
  document.getElementById(cardId).addEventListener("input", () => syncFromCard(cardId, inputId));
});

document.getElementById("resetBtn").addEventListener("click", () => {
  document.getElementById("inputLabel").value = defaults.label;
  document.getElementById("inputTitle").value = defaults.title;
  document.getElementById("inputSub").value = defaults.sub;
  document.getElementById("inputFooter").value = defaults.footer;

});

qrBox.addEventListener("click", () => qrUpload.click());

qrUpload.addEventListener("change", () => {
  const file = qrUpload.files[0];
  if (!file) return;
  const reader = new FileReader();

    qrImage.src = reader.result;
    qrBox.classList.add("has-qr");

  reader.readAsDataURL(file);
});
